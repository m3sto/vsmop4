<!DOCTYPE html>
<html lang="tl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maligayang Pagdating Aking Reyna</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink-primary: #ffb7c5;
            --pink-dark: #ff85a2;
            --white: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #fff0f3;
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            color: #4a4a4a;
        }

        /* Hello Kitty Tema Detayları */
        .header {
            background-color: var(--pink-primary);
            width: 100%;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .kitty-logo {
            width: 80px;
            animation: bounce 2s infinite;
        }

        /* Hediye Alanı */
        #gift-container {
            margin-top: 50px;
            text-align: center;
            min-height: 400px;
            padding: 20px;
        }

        .gift-image {
            width: 250px;
            height: auto;
            display: none;
            margin: 20px auto;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.2));
            animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .gift-title {
            font-family: 'Pacifico', cursive;
            color: var(--pink-dark);
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        /* Butonlar */
        .btn {
            background-color: var(--pink-dark);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 133, 162, 0.4);
            transition: transform 0.3s;
            margin-top: 20px;
        }

        .btn:active {
            transform: scale(0.9);
        }

        /* Mektup Animasyonu */
        #letter-container {
            display: none;
            position: relative;
            margin-top: 40px;
            cursor: pointer;
        }

        .envelope {
            width: 150px;
            transition: transform 0.5s;
        }

        .envelope:hover {
            transform: rotate(-5deg) scale(1.1);
        }

        #actual-letter {
            display: none;
            background: white;
            width: 85%;
            max-width: 350px;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            position: relative;
            z-index: 10;
            line-height: 1.6;
            border: 2px solid var(--pink-primary);
        }

        /* Kalp Patlaması */
        .heart-particle {
            position: absolute;
            color: #ff4d6d;
            font-size: 20px;
            pointer-events: none;
            animation: fly 1s ease-out forwards;
        }

        /* Keyframes */
        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes fly {
            to {
                transform: translate(var(--tw), var(--th)) rotate(var(--tr));
                opacity: 0;
            }
        }

        .final-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="header">
        <img src="https://upload.wikimedia.org/wikipedia/en/thumb/0/05/Hello_kitty_character_portrait.png/220px-Hello_kitty_character_portrait.png" alt="Kitty" class="kitty-logo">
        <h1 style="font-family: 'Pacifico', cursive; color: white; font-size: 1.2rem;">Kamusta, Kitty!</h1>
    </div>

    <div id="gift-container">
        <div id="gift-stage">
            <p class="gift-title" id="gift-text">Mayroon akong sorpresa para sa iyo...</p>
            
            <img id="gift1" class="gift-image" src="https://www.pngplay.com/wp-content/uploads/6/Cute-Cat-Transparent-PNG.png" alt="Cats">
            
            <img id="gift2" class="gift-image" style="transform: scale(1.3);" src="https://png.pngtree.com/png-clipart/20241112/original/pngtree-flower-bouquet-png-image_16936472.png" alt="Bouquet">
            
            <img id="gift3" class="gift-image" src="https://clipart-library.com/image_gallery2/Ring-PNG-Image.png" alt="Ring">
        </div>

        <button class="btn" id="next-btn" onclick="nextGift()">Susunod (Sıradaki)</button>
    </div>

    <div id="letter-container" onclick="openLetter()">
        <img src="https://cdn-icons-png.flaticon.com/512/2665/2665038.png" class="envelope" id="env-img">
        <div id="actual-letter">
            <p id="letter-text" style="font-size: 0.9rem; text-align: left;"></p>
            <div class="final-buttons">
                <button class="btn" style="padding: 10px 20px; font-size: 0.9rem;" onclick="celebrate()">Oo (Evet)</button>
                <button class="btn" style="padding: 10px 20px; font-size: 0.9rem;" onclick="celebrate()">Siyempre Oo (Tabiki Evet)</button>
            </div>
        </div>
    </div>

    <script>
        let currentStage = 0;
        const gifts = ['gift1', 'gift2', 'gift3'];
        const titles = [
            "Para sa iyong lambing...", 
            "Para sa iyong kagandahan...", 
            "Para sa walang hanggan..."
        ];

        function createHearts() {
            for (let i = 0; i < 15; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart-particle';
                heart.innerHTML = '❤️';
                heart.style.left = '50%';
                heart.style.top = '40%';
                heart.style.setProperty('--tw', (Math.random() * 400 - 200) + 'px');
                heart.style.setProperty('--th', (Math.random() * 400 - 200) + 'px');
                heart.style.setProperty('--tr', (Math.random() * 360) + 'deg');
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 1000);
            }
        }

        function nextGift() {
            createHearts();
            
            if (currentStage < gifts.length) {
                // Önceki hediyeyi gizle
                if (currentStage > 0) {
                    document.getElementById(gifts[currentStage-1]).style.display = 'none';
                }
                
                // Yeni hediyeyi göster
                document.getElementById(gifts[currentStage]).style.display = 'block';
                document.getElementById('gift-text').innerText = titles[currentStage];
                currentStage++;
            } else {
                // Hediyeler bitti mektuba geç
                document.getElementById('gift-container').classList.add('hidden');
                document.getElementById('letter-container').style.display = 'block';
            }
        }

        function openLetter() {
            const letter = document.getElementById('actual-letter');
            const env = document.getElementById('env-img');
            const text = "Ang regalong ito para sa maganda at eleganteng ginang ay tila kulang, ngunit ito ang makakaya ko sa ngayon. Dahil sa iyong tamis at alindog, hindi ko agad mapagpasyahan kung ano ang gagawin dahil sa kaba. Ang aking pananabik at pagnanasa ay magtatapos lamang kapag inalis mo ang iyong mga mata sa akin. Gusto ko talagang gumawa ng banner na ganito sa iyong kaarawan, ngunit gusto kong gawin ito ngayon. Hindi pa ako nakakita ng ganito ka-elegante, aesthetic, at kaakit-akit na babae noon. Naging boluntaryong magnanakaw ako para makuha ang iyong puso at mga mata 👉👈. Kaya, mula ngayon, maaari ba kitang tawaging mahal, aking reyna, o aking sinta? 👉👈😗";

            env.style.display = 'none';
            letter.style.display = 'block';
            document.getElementById('letter-text').innerText = text;
        }

        function celebrate() {
            alert("Mahal kita! ❤️");
            setInterval(createHearts, 300);
        }
    </script>
</body>
</html>
